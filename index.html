<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LP Spin</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    overflow: hidden;
  }

  .lp {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 130vmin;
    height: 130vmin;
    transform: translate(-50%, -50%);
    
    border-radius: 50%;
    overflow: hidden;

    animation: spin 8s linear infinite;
  }

  .lp img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
</style>
</head>

<body>

<div class="lp">
  <!-- 네가 보낸 이미지 넣기 -->
  <img src="초록이.jpeg" alt="LP">
</div>

</body>
</html>
